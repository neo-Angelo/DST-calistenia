<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diário de Calistenia</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 40px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1, h2 { color: #333; text-align: center; }
        form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; }
        input, button { padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; }
        button { background-color: #28a745; color: white; cursor: pointer; border: none; font-weight: bold; }
        button:hover { background-color: #218838; }
        .treino-card { background: #e9ecef; padding: 15px; margin-bottom: 10px; border-radius: 5px; border-left: 5px solid #007bff; }
    </style>
</head>
<body>

<div class="container">
    <h1>Meu Diário de Calistenia 💪</h1>
    
    <form action="/adicionar" method="POST">
        <input type="text" name="exercicio" placeholder="Exercício (ex: Pull-ups, Dips)" required>
        <input type="number" name="series" placeholder="Número de Séries" required>
        <input type="number" name="repeticoes" placeholder="Repetições por Série" required>
        <input type="date" name="data" required>
        <button type="submit">Adicionar Treino</button>
    </form>

    <h2>Histórico de Treinos</h2>
    
    {% if treinos %}
        {% for treino in treinos %}
            <div class="treino-card">
                <strong>{{ treino.data }}</strong> - {{ treino.exercicio }}<br>
                Séries: {{ treino.series }} | Repetições: {{ treino.repeticoes }}
            </div>
        {% endfor %}
    {% else %}
        <p style="text-align: center; color: #777;">Nenhum treino registrado ainda. Bora treinar!</p>
    {% endif %}
</div>

</body>
</html>
